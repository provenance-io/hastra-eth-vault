name: Release ABIs

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Compile contracts
      run: npx hardhat compile

    - name: Install chainlink-hub dependencies
      run: cd chainlink-hub && npm install

    - name: Compile chainlink-hub contracts
      run: cd chainlink-hub && npx hardhat compile
      
    - name: Extract ABIs
      run: |
        mkdir -p abi-exports

        # Vault contracts
        jq '.abi' artifacts/contracts/YieldVault.sol/YieldVault.json > abi-exports/YieldVault.json
        jq '.abi' artifacts/contracts/StakingVault.sol/StakingVault.json > abi-exports/StakingVault.json
        jq '.abi' artifacts/contracts/mocks/MockUSDC.sol/MockUSDC.json > abi-exports/MockUSDC.json

        # Chainlink NAV contracts
        jq '.abi' chainlink-hub/artifacts/contracts/HastraHub.sol/HastraHub.json > abi-exports/HastraHub.json
        jq '.abi' chainlink-hub/artifacts/contracts/FeedVerifier.sol/FeedVerifier.json > abi-exports/FeedVerifier.json

        # Create version info
        echo "{\"version\": \"${{ github.ref_name }}\", \"commit\": \"${{ github.sha }}\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > abi-exports/version.json

        echo "тЬЕ ABIs extracted successfully"
        ls -lh abi-exports/
        
    - name: Create ABI packages
      run: |
        cd abi-exports
        tar -czf ../hastra-vault-abis-${{ github.ref_name }}.tar.gz .
        cd ..
        zip -r hastra-vault-abis-${{ github.ref_name }}.zip abi-exports/
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          hastra-vault-abis-${{ github.ref_name }}.tar.gz
          hastra-vault-abis-${{ github.ref_name }}.zip
        body: |
          ## Contract ABIs - ${{ github.ref_name }}
          
          This release includes the compiled ABIs for:
          - `YieldVault` (wYLDS)
          - `StakingVault` (PRIME)
          - `HastraHub` (NAV engine тАФ UUPS upgradeable)
          - `FeedVerifier` (Chainlink Data Streams verifier тАФ UUPS upgradeable)
          - `MockUSDC` (testing only)
          
          ### Files
          - `hastra-vault-abis-${{ github.ref_name }}.tar.gz` - Compressed tarball
          - `hastra-vault-abis-${{ github.ref_name }}.zip` - Zip archive
          
          **Commit:** ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
