[profile.default]
src = "contracts"
out = "forge-out"
libs = ["node_modules", "lib"]
test = "test/foundry"
cache_path = "forge-cache"
solc = "0.8.28"
evm_version = "paris"
optimizer = true
optimizer_runs = 200

# Fuzz testing configuration
[fuzz]
runs = 1000              # Number of scenarios per fuzz test (increase for deeper testing)
max_test_rejects = 65536 # Max rejections before giving up
seed = '0x1234'          # Optional: deterministic seed for reproducible results

[invariant]
runs = 256               # Number of sequences to run
depth = 15               # Number of calls in each sequence
fail_on_revert = false   # Continue even if some calls revert
call_override = false    # Don't override calls

# Gas reporting
gas_reports = ["YieldVault", "StakingVault"]

# Remappings for OpenZeppelin, Chainlink and Forge
# Note: Single OpenZeppelin version (v5.4.0) after migrating away from dual-version setup
remappings = [
    "@openzeppelin/contracts-upgradeable/=node_modules/@openzeppelin/contracts-upgradeable/",
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
    "@chainlink/contracts/=node_modules/@chainlink/contracts/",
    "forge-std/=lib/forge-std/src/"
]

# CI profile - faster but less thorough
[profile.ci.fuzz]
runs = 100

# Deep testing profile - for critical audits
[profile.deep.fuzz]
runs = 10000

[profile.deep.invariant]
runs = 1000
depth = 50
